name: tamaprint-ol

services:
  orderloader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orderloader
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      # Carpeta donde la aplicación guardará DB y adjuntos según lib/config.ts
      - DATA_DIR=/app/.data
      # Zona horaria Colombia (GMT-5) — evita desfase UTC en fechas SAP
      - TZ=America/Bogota
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      # Volumen mapeado: [Ruta_Segura_Local]:[Ruta_Contenedor]
      # Todos los datos de SQLite y pedidos vivirán localmente en la carpeta './data' al lado del docker-compose.yml
      - ./.data:/app/.data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
