name: flexoimpresos-ol

services:
  orderloader-flexo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orderloader-flexo
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - DATA_DIR=/app/.data
      - TZ=America/Bogota
    env_file:
      - .env.flexoimpresos
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./.data.flexoimpresos:/app/.data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
